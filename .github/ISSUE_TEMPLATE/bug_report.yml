name: Bug report
description: Report a reproducible bug or behavioral regression.
title: '[bug] '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide a minimal reproduction and include relevant environment details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest sequence that reproduces the issue.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Neovim version, install method, and relevant tools.
      placeholder: |
        OS:
        Neovim:
        Install method:
        Tools available:
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Relevant health or error output
      description: Paste any `:checkhealth` output, Lua errors, or stack traces.
      render: shell